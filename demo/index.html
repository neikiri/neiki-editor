<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neiki's HTML Editor</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/neikiri/neiki-editor@2.3.0/dist/neiki-editor.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a;
            color: #e2e8f0;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* ── Header ── */
        .header {
            height: 65px;
            min-height: 65px;
            background: #1E1E1E;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
            border-bottom: 1px solid #334155;
        }

        .header-logo {
            height: 40px;
            flex-shrink: 0;
        }

        .header-title {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            font-weight: 600;
            color: #f1f5f9;
            white-space: nowrap;
            letter-spacing: 0.3px;
        }

        .header-actions {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-shrink: 0;
        }

        .header-separator {
            width: 1px;
            height: 28px;
            background: #475569;
            margin: 0 4px;
        }

        .header-btn {
            background: #334155;
            border: 1px solid #475569;
            color: #e2e8f0;
            padding: 7px 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: background 0.15s, border-color 0.15s;
            white-space: nowrap;
        }

        .header-btn:hover {
            background: #475569;
            border-color: #64748b;
        }

        .header-btn:active {
            background: #1e293b;
        }

        .header-btn svg {
            width: 15px;
            height: 15px;
            fill: currentColor;
            flex-shrink: 0;
        }

        .header-btn.btn-danger {
            color: #fca5a5;
        }

        .header-btn.btn-danger:hover {
            background: #7f1d1d;
            border-color: #991b1b;
        }

        /* ── Hamburger Menu ── */
        .hamburger-btn {
            display: none;
            background: none;
            border: none;
            color: #e2e8f0;
            cursor: pointer;
            padding: 8px;
            margin-left: auto;
        }

        .hamburger-btn svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }

        .mobile-menu {
            display: none;
            position: fixed;
            top: 65px;
            left: 0;
            right: 0;
            bottom: 0;
            background: #1e1e1e;
            z-index: 9999;
            padding: 16px;
            flex-direction: column;
            gap: 8px;
            overflow-y: auto;
        }

        .mobile-menu.active {
            display: flex;
        }

        .mobile-menu .header-btn {
            width: 100%;
            justify-content: flex-start;
            padding: 12px 16px;
        }

        .mobile-menu .header-separator {
            width: 100%;
            height: 1px;
            margin: 8px 0;
        }

        .mobile-menu .lang-switcher-mobile {
            width: 100%;
            padding: 12px 16px;
        }

        /* ── Responsive ── */
        @media (max-width: 900px) {
            .header-title {
                display: none;
            }

            .header-actions {
                display: none;
            }

            .hamburger-btn {
                display: block;
            }
        }

        @media (min-width: 901px) {
            .mobile-menu {
                display: none !important;
            }
        }

        /* ── Editor wrapper ── */
        .editor-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .editor-wrapper .neiki-editor-container {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .editor-wrapper .neiki-content-area {
            flex: 1;
        }

        /* ── Preview Modal ── */
        .preview-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .preview-overlay.active {
            display: flex;
        }

        .preview-modal {
            background: #fff;
            border-radius: 10px;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .preview-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            background: #1e293b;
            color: #f1f5f9;
            font-weight: 600;
            font-size: 14px;
        }

        .preview-close {
            background: none;
            border: none;
            color: #94a3b8;
            cursor: pointer;
            font-size: 20px;
            line-height: 1;
            padding: 4px 8px;
            border-radius: 4px;
            transition: color 0.15s, background 0.15s;
        }

        .preview-close:hover {
            color: #fff;
            background: #334155;
        }

        .preview-body {
            flex: 1;
            overflow: auto;
            padding: 30px;
            color: #1e293b;
            font-size: 15px;
            line-height: 1.7;
        }

        .preview-body img {
            max-width: 100%;
        }

        .preview-body table {
            border-collapse: collapse;
            width: 100%;
        }

        .preview-body table td,
        .preview-body table th {
            border: 1px solid #d1d5db;
            padding: 8px 12px;
        }
    </style>
</head>

<body>

    <!-- ── Header ── -->
    <header class="header">
        <img src="logo.png" alt="Neiki Editor" class="header-logo">
        <span class="header-title">Neiki's HTML Editor</span>

        <!-- Hamburger button (mobile) -->
        <button class="hamburger-btn" onclick="toggleMobileMenu()" aria-label="Menu">
            <svg viewBox="0 0 24 24" id="hamburgerIcon">
                <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z" />
            </svg>
        </button>

        <!-- Desktop actions -->
        <div class="header-actions">
            <!-- Document group -->
            <button class="header-btn" onclick="newDocument()" id="btnNew">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
                </svg>
                <span data-i18n="new">New</span>
            </button>
            <button class="header-btn" onclick="uploadDocument()" id="btnUpload">
                <svg viewBox="0 0 24 24">
                    <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z" />
                </svg>
                <span data-i18n="upload">Upload</span>
            </button>

            <div class="header-separator"></div>

            <!-- Save group -->
            <button class="header-btn" onclick="saveToCache()" id="btnSave">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
                </svg>
                <span data-i18n="save">Save</span>
            </button>
            <button class="header-btn" onclick="downloadDocument()" id="btnDownload">
                <svg viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
                </svg>
                <span data-i18n="download">Download</span>
            </button>

            <div class="header-separator"></div>

            <!-- View group -->
            <button class="header-btn" onclick="previewDocument()" id="btnPreview">
                <svg viewBox="0 0 24 24">
                    <path
                        d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
                </svg>
                <span data-i18n="preview">Preview</span>
            </button>
            <button class="header-btn btn-danger" onclick="clearDocument()" id="btnClear">
                <svg viewBox="0 0 24 24">
                    <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
                </svg>
                <span data-i18n="clear">Clear</span>
            </button>

            <div class="header-separator"></div>

            <!-- Language switcher -->
            <select id="langSwitcher" class="header-btn" style="padding: 7px 10px; cursor: pointer;"
                onchange="switchLanguage(this.value)" title="Language">
                <option value="en">🇬🇧 EN</option>
                <option value="cs">🇨🇿 CZ</option>
            </select>
        </div>
    </header>

    <!-- ── Mobile Menu ── -->
    <div class="mobile-menu" id="mobileMenu">
        <button class="header-btn" onclick="newDocument(); closeMobileMenu()">
            <svg viewBox="0 0 24 24">
                <path
                    d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z" />
            </svg>
            <span data-i18n="new">New</span>
        </button>
        <button class="header-btn" onclick="uploadDocument(); closeMobileMenu()">
            <svg viewBox="0 0 24 24">
                <path d="M9 16h6v-6h4l-7-7-7 7h4v6zm-4 2h14v2H5v-2z" />
            </svg>
            <span data-i18n="upload">Upload</span>
        </button>
        <div class="header-separator"></div>
        <button class="header-btn" onclick="saveToCache(); closeMobileMenu()">
            <svg viewBox="0 0 24 24">
                <path
                    d="M17 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z" />
            </svg>
            <span data-i18n="save">Save</span>
        </button>
        <button class="header-btn" onclick="downloadDocument(); closeMobileMenu()">
            <svg viewBox="0 0 24 24">
                <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z" />
            </svg>
            <span data-i18n="download">Download</span>
        </button>
        <div class="header-separator"></div>
        <button class="header-btn" onclick="previewDocument(); closeMobileMenu()">
            <svg viewBox="0 0 24 24">
                <path
                    d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z" />
            </svg>
            <span data-i18n="preview">Preview</span>
        </button>
        <button class="header-btn btn-danger" onclick="clearDocument(); closeMobileMenu()">
            <svg viewBox="0 0 24 24">
                <path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z" />
            </svg>
            <span data-i18n="clear">Clear</span>
        </button>
        <div class="header-separator"></div>
        <select id="langSwitcherMobile" class="header-btn lang-switcher-mobile" onchange="switchLanguage(this.value)"
            title="Language">
            <option value="en">🇬🇧 English</option>
            <option value="cs">🇨🇿 Čeština</option>
        </select>
    </div>

    <!-- ── Editor ── -->
    <div class="editor-wrapper">
        <textarea id="editor"></textarea>
    </div>

    <!-- ── Preview Modal ── -->
    <div class="preview-overlay" id="previewOverlay">
        <div class="preview-modal">
            <div class="preview-header">
                <span>📄 Document Preview</span>
                <button class="preview-close" onclick="closePreview()">&times;</button>
            </div>
            <div class="preview-body" id="previewBody"></div>
        </div>
    </div>

    <!-- Hidden file input -->
    <input type="file" id="fileInput" accept=".html,.htm" style="display:none" onchange="handleFileUpload(event)">

    <script src="https://cdn.jsdelivr.net/gh/neikiri/neiki-editor@2.3.0/dist/neiki-editor.js"></script>
    <script>
        // Demo UI translations
        const UI_TRANSLATIONS = {
            en: {
                new: 'New',
                upload: 'Upload',
                save: 'Save',
                download: 'Download',
                preview: 'Preview',
                clear: 'Clear',
                confirmNew: 'Create a new document? Unsaved changes will be lost.',
                confirmClear: 'Clear all content?',
                savedNotification: 'Document saved to browser cache'
            },
            cs: {
                new: 'Nový',
                upload: 'Nahrát',
                save: 'Uložit',
                download: 'Stáhnout',
                preview: 'Náhled',
                clear: 'Vymazat',
                confirmNew: 'Vytvořit nový dokument? Neuložené změny budou ztraceny.',
                confirmClear: 'Vymazat veškerý obsah?',
                savedNotification: 'Dokument uložen do mezipaměti prohlížeče'
            }
        };

        // Get language from URL or localStorage
        const urlParams = new URLSearchParams(window.location.search);
        const savedLang = localStorage.getItem('neiki-editor-lang') || 'en';
        const initialLang = urlParams.get('lang') || savedLang;

        // Translation helper for demo UI
        function t(key) {
            return UI_TRANSLATIONS[initialLang]?.[key] || UI_TRANSLATIONS['en'][key] || key;
        }

        // Apply translations to header buttons
        function applyTranslations() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                el.textContent = t(key);
            });
        }

        // Initialize editor with language
        let editor = new NeikiEditor('#editor', {
            language: initialLang
        });

        // Set language switcher to current language
        document.getElementById('langSwitcher').value = initialLang;
        document.getElementById('langSwitcherMobile').value = initialLang;

        // Apply translations on load
        applyTranslations();

        // Mobile menu functions
        function toggleMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const icon = document.getElementById('hamburgerIcon');
            const isOpen = menu.classList.toggle('active');
            // Change icon to X when open
            if (isOpen) {
                icon.innerHTML = '<path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/>';
            } else {
                icon.innerHTML = '<path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>';
            }
        }

        function closeMobileMenu() {
            const menu = document.getElementById('mobileMenu');
            const icon = document.getElementById('hamburgerIcon');
            menu.classList.remove('active');
            icon.innerHTML = '<path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>';
        }

        // Switch language function
        function switchLanguage(lang) {
            localStorage.setItem('neiki-editor-lang', lang);
            // Save current content
            const content = editor.getContent();
            localStorage.setItem(CACHE_KEY, content);
            // Reload page with new language
            const url = new URL(window.location);
            url.searchParams.set('lang', lang);
            window.location.href = url.toString();
        }

        const CACHE_KEY = 'neiki-html-editor-document';

        // ── Load cached content on startup ──
        (function loadCached() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                editor.setContent(cached);
            }
        })();

        // ── New Document ──
        function newDocument() {
            if (!editor.getContent().trim() || confirm(t('confirmNew'))) {
                editor.setContent('');
            }
        }

        // ── Upload HTML ──
        function uploadDocument() {
            document.getElementById('fileInput').click();
        }

        function handleFileUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function (e) {
                let html = e.target.result;

                // Extract <body> content if it's a full HTML document
                const bodyMatch = html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);
                if (bodyMatch) {
                    html = bodyMatch[1];
                }

                editor.setContent(html.trim());
            };
            reader.readAsText(file);

            // Reset input so the same file can be re-uploaded
            event.target.value = '';
        }

        // ── Save to Cache ──
        function saveToCache() {
            const content = editor.getContent();
            localStorage.setItem(CACHE_KEY, content);
            showNotification(t('savedNotification'));
        }

        // ── Download as HTML ──
        function downloadDocument() {
            const content = editor.getContent();
            const fullHTML = `<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 800px; margin: 40px auto; padding: 0 20px; line-height: 1.7; color: #1e293b; }
        img { max-width: 100%; }
        table { border-collapse: collapse; width: 100%; }
        table td, table th { border: 1px solid #d1d5db; padding: 8px 12px; }
    </style>
</head>
<body>
${content}
</body>
</html>`;

            const blob = new Blob([fullHTML], {type: 'text/html'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'document.html';
            a.click();
            URL.revokeObjectURL(url);
        }

        // ── Preview ──
        function previewDocument() {
            const content = editor.getContent();
            document.getElementById('previewBody').innerHTML = content;
            document.getElementById('previewOverlay').classList.add('active');
        }

        function closePreview() {
            document.getElementById('previewOverlay').classList.remove('active');
        }

        // Close preview on overlay click
        document.getElementById('previewOverlay').addEventListener('click', function (e) {
            if (e.target === this) closePreview();
        });

        // Close preview on Escape
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape') closePreview();
        });

        // ── Clear ──
        function clearDocument() {
            if (!editor.getContent().trim() || confirm(t('confirmClear'))) {
                editor.setContent('');
            }
        }

        // ── Notification helper ──
        function showNotification(message) {
            const el = document.createElement('div');
            el.textContent = message;
            Object.assign(el.style, {
                position: 'fixed',
                bottom: '20px',
                right: '20px',
                background: '#334155',
                color: '#e2e8f0',
                padding: '10px 18px',
                borderRadius: '8px',
                fontSize: '13px',
                fontWeight: '500',
                boxShadow: '0 4px 20px rgba(0,0,0,0.4)',
                zIndex: '99999',
                transition: 'opacity 0.3s',
                border: '1px solid #475569'
            });
            document.body.appendChild(el);
            setTimeout(() => {el.style.opacity = '0';}, 1500);
            setTimeout(() => {el.remove();}, 1800);
        }
    </script>
</body>

</html>
