<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neiki Editor - Demo</title>
    <link rel="stylesheet" href="../dist/neiki-editor.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
            color: white;
        }

        header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1rem;
            opacity: 0.9;
        }

        .demo-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .demo-header {
            background: #f8f9fa;
            padding: 20px 24px;
            border-bottom: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .demo-header h2 {
            font-size: 1.2rem;
            color: #333;
        }

        .theme-toggle {
            display: flex;
            gap: 8px;
        }

        .theme-toggle button {
            padding: 8px 16px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .theme-toggle button:hover {
            background: #f0f0f0;
        }

        .theme-toggle button.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .demo-content {
            padding: 24px;
        }

        .output-section {
            margin-top: 24px;
            padding-top: 24px;
            border-top: 1px solid #e9ecef;
        }

        .output-section h3 {
            font-size: 1rem;
            color: #666;
            margin-bottom: 12px;
        }

        .output-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .output-tabs button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .output-tabs button.active {
            background: #333;
            color: white;
            border-color: #333;
        }

        .output-box {
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            border-radius: 8px;
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.85rem;
            max-height: 200px;
            overflow: auto;
            white-space: pre-wrap;
            word-break: break-all;
        }

        footer {
            text-align: center;
            margin-top: 40px;
            color: white;
            opacity: 0.8;
        }

        footer a {
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>✨ Neiki Editor</h1>
            <p>Lightweight WYSIWYG Rich Text Editor</p>
        </header>

        <div class="demo-card">
            <div class="demo-header">
                <h2>Full Editor Demo</h2>
                <div class="theme-toggle">
                    <button class="active" onclick="switchTheme('light', this)">☀️ Light</button>
                    <button onclick="switchTheme('dark', this)">🌙 Dark</button>
                </div>
            </div>

            <div class="demo-content">
                <textarea id="demo-editor"></textarea>

                <div class="output-section">
                    <h3>Output</h3>
                    <div class="output-tabs">
                        <button class="active" onclick="showOutput('html')">HTML</button>
                        <button onclick="showOutput('text')">Plain Text</button>
                    </div>
                    <div class="output-box" id="output-box"></div>
                </div>
            </div>
        </div>

        <footer>
            <p>Made with ❤️ | <a href="https://github.com/neikiri/neiki-editor" target="_blank">GitHub</a></p>
        </footer>
    </div>

    <script src="../dist/neiki-editor.js"></script>
    <script>
        let editor;
        let isDarkTheme = false;

        document.addEventListener('DOMContentLoaded', function() {
            editor = new NeikiEditor('#demo-editor', {
                height: 400,
                theme: 'light',
                placeholder: 'Start typing here...',
                toolbar: [
                    'undo', 'redo', '|',
                    'formatBlock', 'fontName', 'fontSize', '|',
                    'bold', 'italic', 'underline', 'strikethrough', '|',
                    'foreColor', 'backColor', '|',
                    'alignLeft', 'alignCenter', 'alignRight', 'alignJustify', '|',
                    'insertOrderedList', 'insertUnorderedList', '|',
                    'indent', 'outdent', '|',
                    'createLink', 'insertImage', 'insertTable', '|',
                    'blockquote', 'insertHorizontalRule', 'insertCode', '|',
                    'subscript', 'superscript', '|',
                    'removeFormat', 'findReplace', '|',
                    'emoji', 'specialChar', '|',
                    'source', 'fullscreen', 'print'
                ],
                onChange: function(content) {
                    updateOutput();
                }
            });

            editor.setContent('<h2>Welcome to Neiki Editor! 🎉</h2><p>This is a <strong>full-featured</strong> WYSIWYG editor with support for:</p><ul><li>Text formatting (bold, italic, underline, strikethrough)</li><li>Multiple fonts and sizes</li><li>Text and background colors</li><li>Lists and alignment</li><li>Links, images, and tables</li><li>Code blocks and blockquotes</li><li>Emoji and special characters</li><li>Dark mode support</li></ul><p>Try editing this content or start fresh!</p>');
            updateOutput();
        });

        let currentOutputType = 'html';

        function switchTheme(theme, btn) {
            if (editor) {
                editor.setTheme(theme);
            }
            document.querySelectorAll('.theme-toggle button').forEach(b => {
                b.classList.remove('active');
            });
            btn.classList.add('active');
        }

        function showOutput(type) {
            currentOutputType = type;
            document.querySelectorAll('.output-tabs button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            updateOutput();
        }

        function updateOutput() {
            const outputBox = document.getElementById('output-box');
            if (currentOutputType === 'html') {
                outputBox.textContent = editor.getContent();
            } else {
                outputBox.textContent = editor.getText();
            }
        }
    </script>
</body>
</html>
